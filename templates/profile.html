{% extends "layout.html" %}
{% block content %}

<h2>👤 Profile</h2>

<div class="profile-info-container">
  <div class="profile-info">
    <p><strong>Name:</strong> {{ user.get_full_name() }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
  </div>
  
  <div class="profile-edit">
    <h3>Update Profile</h3>
    <form method="POST" action="{{ url_for('user.update_profile') }}">
      <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" name="first_name" id="first_name" class="form-control" 
               value="{{ user.first_name or '' }}">
      </div>
      <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" name="last_name" id="last_name" class="form-control" 
               value="{{ user.last_name or '' }}">
      </div>
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" name="location" id="location" class="form-control" 
               value="{{ user.location or '' }}" placeholder="City, Country">
        <small class="form-text text-muted">Help other fans find you at tournaments</small>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="notifications" {% if user.notifications %}checked{% endif %}>
          Receive email updates and reminders
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    
    <p><a href="{{ url_for('user.change_password') }}" class="btn btn-outline-secondary mt-3">🔐 Change Password</a></p>
  </div>
</div>

<hr>

<h3>🎾 Your Activity</h3>
<p><a href="{{ url_for('user.my_tournaments') }}">View My Tournaments</a></p>




<hr>

<h3>⚙️ Account Management</h3>
<p><a href="{{ url_for('auth.logout') }}">👋 Log Out</a></p>

{% endblock %}
