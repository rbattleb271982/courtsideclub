<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtSide Club Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background-color: #27ae60;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 20px;
            background: #f9f9f9;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999;
        }
        .btn {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CourtSide Club</h1>
        </div>
        <div class="content">
            <h2>Hello {{ name }},</h2>
            <p>{{ message }}</p>
            
            <p>Thank you for being part of our tennis community!</p>
            
            <a href="#" class="btn">Visit CourtSide Club</a>
        </div>
        <div class="footer">
            <p>&copy; 2023 CourtSide Club. All rights reserved.</p>
            <p>
                If you no longer wish to receive these emails, you can 
                <a href="#">unsubscribe</a> at any time.
            </p>
        </div>
    </div>
</body>
</html>
