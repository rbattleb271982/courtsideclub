{% extends "public/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-logo">
        <h1>CourtSide Club</h1>
        <p>Connect with other tennis enthusiasts</p>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Log In</h2>
        </div>
        <div class="card-body">
            {% if google_enabled %}
            <a href="{{ url_for('auth.google_login') }}" class="social-login-btn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                    <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                    <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                    <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                </svg>
                Sign in with Google
            </a>

            <div class="auth-divider">
                <span class="auth-divider-text">or</span>
            </div>
            {% endif %}

            <form action="{{ url_for('auth.login') }}" method="post" class="needs-validation" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <div class="form-group form-check mt-3">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Keep me logged in</label>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-block">Log In</button>
                </div>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.reset_password_request') }}">Forgot your password?</a>
                </div>
            </form>
        </div>
        <div class="card-footer text-center">
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Register now</a></p>
        </div>
    </div>
</div>
{% endblock %}
