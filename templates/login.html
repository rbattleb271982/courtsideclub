{% extends "public/base.html" %}

{% block title %}Login – CourtSide Club{% endblock %}

{% block content %}
<div class="min-h-screen bg-cover bg-center bg-no-repeat py-24 relative" style="background-image: url('{{ url_for('static', filename='images/hero-tennis.jpg') }}');">
  <!-- Overlay for better readability -->
  <div class="absolute inset-0 bg-black bg-opacity-40"></div>
  
  <div class="max-w-md mx-auto px-6 relative z-10">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden backdrop-blur-sm bg-opacity-95">
      <!-- Header -->
      <div class="bg-csc-green px-8 py-6">
        <h1 class="text-2xl font-bold text-white font-inter">Log In</h1>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        {% if google_enabled %}
        <a href="{{ url_for('auth.google_login') }}" 
           class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:border-slate-300 text-slate-700 font-medium py-3 px-4 rounded-xl transition-all duration-300 hover:shadow-md mb-6">
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
            <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
          </svg>
          Sign in with Google
        </a>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-slate-500 font-medium">or</span>
          </div>
        </div>
        {% endif %}

        <form action="{{ url_for('auth.login') }}" method="post" class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-2 font-inter">Email address</label>
            <input type="email" 
                   id="email" 
                   name="email" 
                   required
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-csc-green focus:border-transparent transition-all duration-200 font-inter">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-2 font-inter">Password</label>
            <input type="password" 
                   id="password" 
                   name="password" 
                   required
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-csc-green focus:border-transparent transition-all duration-200 font-inter">
          </div>

          <div class="flex items-center">
            <input type="checkbox" 
                   id="remember" 
                   name="remember" 
                   class="w-4 h-4 text-csc-green border-slate-300 rounded focus:ring-csc-green">
            <label for="remember" class="ml-3 text-sm text-slate-600 font-inter">Keep me logged in</label>
          </div>

          <button type="submit" 
                  class="w-full bg-csc-green hover:bg-csc-blue text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl font-inter">
            Log In
          </button>
          
          <div class="text-center">
            <a href="{{ url_for('auth.reset_password_request') }}" 
               class="text-sm text-slate-600 hover:text-csc-green transition-colors duration-200 font-inter">
              Forgot your password?
            </a>
          </div>
        </form>
      </div>

      <!-- Footer -->
      <div class="bg-slate-50 px-8 py-6 text-center border-t border-slate-200">
        <p class="text-sm text-slate-600 font-inter">
          Don't have an account? 
          <a href="{{ url_for('auth.signup') }}" 
             class="text-csc-green hover:text-csc-blue font-medium transition-colors duration-200">
            Register now
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
