{% extends "public/base.html" %}

{% block title %}Login – CourtSide Club{% endblock %}

{% block head %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #FFFFFF;
    color: #171717;
  }

  .login-hero {
    background: #F9FAF8;
    padding: 4rem 1.5rem;
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-container {
    max-width: 28rem;
    width: 100%;
    background: white;
    border-radius: 0.75rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .login-header {
    background: #4a5d2a;
    padding: 2rem;
    text-align: center;
  }

  .login-header h1 {
    font-family: 'Crimson Text', serif;
    font-size: 2rem;
    font-weight: 600;
    color: white;
    margin: 0;
  }

  .login-form {
    padding: 2rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  .form-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    margin-bottom: 0.5rem;
  }

  .form-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    font-size: 1rem;
    transition: border-color 0.2s ease;
  }

  .form-input:focus {
    outline: none;
    border-color: #4a5d2a;
    box-shadow: 0 0 0 3px rgba(74, 93, 42, 0.1);
  }

  .submit-button {
    width: 100%;
    background: #4a5d2a;
    color: white;
    font-weight: 600;
    padding: 0.75rem 1rem;
    border: none;
    border-radius: 0.5rem;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  .submit-button:hover {
    background: #3d4b22;
  }

  .login-footer {
    background: #f8f9fa;
    padding: 1.5rem 2rem;
    text-align: center;
    border-top: 1px solid #e5e7eb;
  }

  .login-footer a {
    color: #4a5d2a;
    text-decoration: none;
    font-weight: 500;
  }

  .login-footer a:hover {
    color: #3d4b22;
  }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .checkbox {
    width: 1rem;
    height: 1rem;
  }

  .forgot-password {
    text-align: center;
    margin-top: 1rem;
  }

  .forgot-password a {
    color: #6b7280;
    text-decoration: none;
    font-size: 0.875rem;
  }

  .forgot-password a:hover {
    color: #669127;
  }
</style>
{% endblock %}

{% block content %}
<div class="login-hero">
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <h1>Log In</h1>
    </div>

    <!-- Form -->
    <div class="login-form">
      <form action="{{ url_for('auth.login') }}" method="post">
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <input type="email" 
                 id="email" 
                 name="email" 
                 required
                 class="form-input">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" 
                 id="password" 
                 name="password" 
                 required
                 class="form-input">
        </div>

        <div class="checkbox-group">
          <input type="checkbox" 
                 id="remember" 
                 name="remember" 
                 class="checkbox">
          <label for="remember">Keep me logged in</label>
        </div>

        <button type="submit" class="submit-button">
          Log In
        </button>
        
        <div class="forgot-password">
          <a href="{{ url_for('auth.reset_password_request') }}">
            Forgot your password?
          </a>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>
        Don't have an account? 
        <a href="{{ url_for('auth.signup') }}">Register now</a>
      </p>
    </div>
    </div>
  </div>
</div>
{% endblock %}
