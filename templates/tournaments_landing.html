
{% extends "layout.html" %}

{% block title %}Tournaments | CourtSide Club{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto; padding: 2rem 1rem;">
  <h1>Tournaments</h1>

  {% for t in tournaments %}
    <div style="padding: 1rem; border: 1px solid #eee; border-radius: 1rem; margin-bottom: 1rem;">
      <strong>{{ t.name }}</strong><br>
      {{ t.city }}, {{ t.country }}<br>
      {{ t.start_date.strftime('%B %d, %Y') }}
    </div>
  {% endfor %}
</div>
{% endblock %}
