
{% extends "public/base.html" %}

{% block title %}Browse Tournaments{% endblock %}

{% block content %}
<h1>Upcoming Tournament</h1>
{% for t in tournaments %}
  <div class="tournament-card">
    <h2>{{ t.name }}</h2>
    <p>{{ t.city }}, {{ t.country }}</p>
    <p>{{ t.start_date.strftime('%B %d, %Y') }}</p>
    <a href="{{ url_for('main.public_tournament_detail', slug=t.slug) }}">View Details</a>
  </div>
{% endfor %}
{% endblock %}
