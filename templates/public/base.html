
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CourtSide Club{% endblock %}</title>
  <meta name="description" content="{% block description %}Meet tennis fans at tournaments. Join the community and connect IRL.{% endblock %}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}CourtSide Club{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Find tennis fans near you at tournaments around the world.{% endblock %}">
  <meta property="og:image" content="{% block og_image %}/static/images/og-default.jpg{% endblock %}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block twitter_title %}CourtSide Club{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}Connect with fellow tennis fans at ATP & WTA events.{% endblock %}">
  <meta name="twitter:image" content="{% block twitter_image %}/static/images/og-default.jpg{% endblock %}">
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    nav {
      background: #007f5f;
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0.5rem;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main { padding: 1.5rem; }
    .cta-button {
      display: inline-block;
      background: #007f5f;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      margin-top: 1rem;
    }
    .cta-button:hover {
      background: #006346;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/how-it-works">How It Works</a>
    <a href="/lanyard">Lanyard</a>
    <a href="/faqs">FAQs</a>
    <a href="/blog">Blog</a>
    <a href="/login">Login</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer style="text-align: center; margin-top: 3rem; padding: 2rem; font-size: 0.9rem; background: #f4f4f4;">
    <p>
      Explore: 
      <a href="/how-it-works">How It Works</a> · 
      <a href="/lanyard">Free Lanyard</a> · 
      <a href="/faqs">FAQs</a> · 
      <a href="/blog">Blog</a>
    </p>
  </footer>
</body>
</html>
