
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CourtSide Club{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Connect with tennis fans at major tournaments{% endblock %}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .public-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        @media (max-width: 768px) {
            .public-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="public-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
