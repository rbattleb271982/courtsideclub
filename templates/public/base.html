
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CourtSide Club{% endblock %}</title>
  <meta name="description" content="{% block description %}Meet fellow tennis fans at tournaments worldwide.{% endblock %}">
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    nav {
      background: #007f5f;
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0.5rem;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main { padding: 1.5rem; }
    .cta-button {
      display: inline-block;
      background: #007f5f;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 4px;
      text-decoration: none;
      margin-top: 1rem;
    }
    .cta-button:hover {
      background: #006346;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/tournaments">Tournaments</a>
    <a href="/how-it-works">How It Works</a>
    <a href="/lanyard">Lanyard</a>
    <a href="/about">About</a>
    <a href="/faqs">FAQs</a>
    <a href="/login">Login</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
