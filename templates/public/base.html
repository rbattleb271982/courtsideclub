<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CourtSide Club{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="mobile-header">
    <div class="nav-container">
      <div class="logo">CourtSide Club</div>
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </div>
    <nav id="mobile-menu" class="mobile-menu">
      <a href="{{ url_for('main.how_it_works') }}">How it Works</a>
      <a href="{{ url_for('main.lanyard_info') }}">Free Lanyard</a>
      <a href="{{ url_for('main.faqs') }}">FAQ</a>
      <a href="{{ url_for('auth.login') }}">Login</a>
      <a href="{{ url_for('auth.signup') }}">Sign Up</a>
    </nav>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script>
    function toggleMenu() {
      const menu = document.getElementById('mobile-menu');
      menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
    }
  </script>
</body>
</html>
