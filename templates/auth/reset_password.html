
{% extends "layout.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
  <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
    <h2 class="text-2xl font-bold mb-4">Set New Password</h2>
    <form method="POST">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="password">New Password</label>
        <input type="password" name="password" id="password" required 
               class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-green-500">
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 mb-2" for="confirm_password">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required
               class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-green-500">
      </div>
      <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-500">
        Reset Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
