<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <script>
    // Force full-page redirect even if inside an iframe
    if (window.top !== window.self) {
      window.top.location = "{{ url_for('user.my_tournaments') }}";
    } else {
      window.location = "{{ url_for('user.my_tournaments') }}";
    }
  </script>
</head>
<body>
  <p>Redirecting you to your tournaments...</p>
</body>
</html>
