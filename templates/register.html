{% extends "public/base.html" %}

{% block title %}Join CourtSide Club{% endblock %}

{% block content %}
<div class="min-h-screen bg-slate-50 py-24">
  <div class="max-w-md mx-auto px-6">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
      <!-- Header -->
      <div class="bg-gradient-to-r from-lime-500 to-lime-600 px-8 py-6">
        <h1 class="text-2xl font-bold text-white font-inter">Join CourtSide Club</h1>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        <form action="{{ url_for('auth.signup') }}" method="post" class="space-y-6">
          <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div>
              <label for="first_name" class="block text-sm font-medium text-slate-700 mb-2 font-inter">First Name</label>
              <input type="text" 
                     id="first_name" 
                     name="first_name" 
                     required
                     class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all duration-200 font-inter">
            </div>
            
            <div>
              <label for="last_name" class="block text-sm font-medium text-slate-700 mb-2 font-inter">Last Name</label>
              <input type="text" 
                     id="last_name" 
                     name="last_name" 
                     required
                     class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all duration-200 font-inter">
            </div>
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-2 font-inter">Email address</label>
            <input type="email" 
                   id="email" 
                   name="email" 
                   required
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all duration-200 font-inter">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-slate-700 mb-2 font-inter">Password</label>
            <input type="password" 
                   id="password" 
                   name="password" 
                   required
                   minlength="8" 
                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
                   title="Must contain at least one number, one uppercase and lowercase letter, and at least 8 characters"
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all duration-200 font-inter">
            <p class="mt-2 text-sm text-slate-500 font-inter">Must be at least 8 characters with uppercase, lowercase, and numbers.</p>
          </div>

          <div>
            <label for="confirm_password" class="block text-sm font-medium text-slate-700 mb-2 font-inter">Confirm Password</label>
            <input type="password" 
                   id="confirm_password" 
                   name="confirm_password" 
                   required
                   class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all duration-200 font-inter">
          </div>

          <button type="submit" 
                  class="w-full bg-gradient-to-r from-lime-500 to-lime-600 hover:from-lime-600 hover:to-lime-700 text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 shadow-lg hover:shadow-xl font-inter">
            Join
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="bg-slate-50 px-8 py-6 text-center border-t border-slate-200">
        <p class="text-sm text-slate-600 font-inter">
          Already have an account? 
          <a href="{{ url_for('auth.login') }}" 
             class="text-lime-600 hover:text-lime-700 font-medium transition-colors duration-200">
            Log in
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Form validation for password confirmation
    console.log('Registration form loaded');
    
    const form = document.querySelector('form');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm_password');
    
    // Check if passwords match on form submission
    form.addEventListener('submit', function(event) {
        if (password.value !== confirmPassword.value) {
            event.preventDefault();
            alert('Passwords do not match. Please try again.');
        }
    });
    
    // Live validation for confirm password field
    confirmPassword.addEventListener('input', function() {
        if (password.value !== confirmPassword.value) {
            confirmPassword.setCustomValidity('Passwords do not match');
        } else {
            confirmPassword.setCustomValidity('');
        }
    });
});
</script>
{% endblock %}
